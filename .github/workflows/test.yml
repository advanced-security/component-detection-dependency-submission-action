name: "Test"
permissions:
  contents: read
on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  # test action works running from the graph
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
    steps:
    # TODO: Pin this third-party action to a full commit SHA after human review.
    - uses: actions/checkout@v6
    - name: Unit test
      run: |
        npm ci
        npm run test
        
